<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/nuscript-favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0B1220" />

    <!-- Default tags (overridden per page by react-helmet-async) -->
    <title>NuScript Technologies — AI-Native Systems for India's Healthcare & Pharma</title>
    <meta name="description" content="NuScript Technologies builds intelligent platforms for India's medical transcription industry and retail pharmacy sector. Engineering-first vertical SaaS from Coimbatore." />

    <!-- Open Graph defaults -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="NuScript Technologies" />
    <meta property="og:title" content="NuScript Technologies — AI-Native Systems for India's Healthcare & Pharma" />
    <meta property="og:description" content="Building intelligent platforms for India's medical transcription industry and retail pharmacy sector." />
    <meta property="og:url" content="https://nuscript.in" />
    <meta property="og:image" content="https://nuscript.in/og-image.png" />

    <!-- Twitter Card defaults -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@nuscripttech" />
    <meta name="twitter:title" content="NuScript Technologies — AI-Native Systems for India's Healthcare & Pharma" />
    <meta name="twitter:description" content="Building intelligent platforms for India's medical transcription industry and retail pharmacy sector." />
    <meta name="twitter:image" content="https://nuscript.in/og-image.png" />

    <!-- Sora font from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" />

    <script>
      // Prevent flash of wrong theme
      (function() {
        var theme = localStorage.getItem('nuscript-theme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
